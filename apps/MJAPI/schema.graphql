input IntegrationSyncConfigInput {
  """
  §4 cross-layer pipelining: a child map starts when ITS parents finish, not the whole layer.
  """
  CrossLayerPipeline: Boolean

  """
  §7 Comprehensive refresh deactivates Declared objects/fields ABSENT from an AUTHORITATIVE discovery (reversible). Default false.
  """
  DeactivateAbsent: Boolean

  """
  Batch size for stage-2 streaming field discovery (records per FetchChanges page). Default 500.
  """
  DiscoveryBatchSize: Int

  """
  Max records sampled in stage-2 streaming field discovery (a column corpus + PK guess; NOT a full scan). Default 500.
  """
  DiscoveryMaxRecords: Int

  """
  Time budget (ms) for stage-2 streaming field discovery before it stops and uses what it gathered.
  """
  DiscoveryTimeBudgetMs: Int

  """
  Upper bound the per-layer AIMD controller ramps toward. Default = connector MaxConcurrencyHint.
  """
  MaxConcurrency: Int

  """
  Merkle/partition hash-diff reconcile for watermark-less change detection (buffers the set in RAM).
  """
  PartitionReconcile: Boolean

  """Override the rate-limiter burst capacity (tokens)."""
  RateLimitBurst: Int

  """
  Override the source rate limit (requests/sec). Default = connector RateLimitPolicy / derived.
  """
  RateLimitTokensPerSec: Float

  """
  Entity maps processed concurrently within a dependency layer (clamped 1-16). Default 1 (sequential).
  """
  SyncConcurrency: Int
}

