       stylesheet renders fa-solid + FA6 names for the whole app, including dynamically-rendered
       Angular icons, with no JS-kit dependency. -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
